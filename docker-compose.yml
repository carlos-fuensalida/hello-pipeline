services:
  app-dev:
    build: .
    profiles: [dev]
    ports:
      - "8080:8080"
    env_file: .env.dev

  app-qa:
    build: .
    profiles: [qa]
    ports:
      - "8081:8080"
    env_file: .env.qa

  app-prod:
    build: .
    profiles: [prod]
    ports:
      - "8082:8080"
    env_file: .env.prod
